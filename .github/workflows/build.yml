name: Build

on:
  push:
    branches:
      - main
      - renovate/**
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Windows build
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up .NET
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore NinaOtel.sln

      - name: Build
        run: dotnet build NinaOtel.sln --configuration Release --no-restore -p:ContinuousIntegrationBuild=true

      - name: Test
        run: dotnet test NinaOtel.sln --configuration Release --no-build --logger "trx;LogFileName=test-results.trx"

      - name: Package plugin
        shell: pwsh
        run: |
          $output = "src/NinaOtel.Plugin/bin/Release/net8.0-windows"
          $zip = "artifacts/NinaOtel.Plugin.zip"
          New-Item -ItemType Directory -Force -Path "artifacts" | Out-Null
          if (Test-Path $zip) {
            Remove-Item -Force $zip
          }
          Compress-Archive -Path "$output/*" -DestinationPath $zip -Force

      - name: Upload plugin artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: NinaOtel.Plugin
          path: artifacts/NinaOtel.Plugin.zip
          if-no-files-found: error
